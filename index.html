<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Universe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a050d; /* Deep, romantic midnight background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: crossorigin;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .instruction {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            z-index: 2;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="instruction">Move closer. Click to pulse our heart.</div>
    <canvas id="universe"></canvas>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 180;
        let mouse = { x: null, y: null, radius: 150 };
        let heartMode = false;
        let heartTimer = 0;

        // Handle resizing
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Track Mouse/Touch
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        });
        window.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Trigger Heart Formation on Click
        window.addEventListener('click', () => {
            heartMode = true;
            heartTimer = 120; // Stay in heart shape for ~2 seconds
        });
        window.addEventListener('touchstart', () => {
            heartMode = true;
            heartTimer = 120;
        });

        // Mathematical Heart Formula coordinates
        function getHeartPoint(t, scale) {
            // Standard parametric heart equations
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * scale, y: -y * scale }; // invert y for canvas coordinates
        }

        // Particle Blueprint
        class Particle {
            constructor(index) {
                this.index = index;
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = this.x;
                this.baseY = this.y;
                
                // Mix of Red/Crimson and Warm Gold/Amber
                this.isGold = Math.random() > 0.4; 
                this.color = this.isGold ? `rgba(255, 215, 0, ${Math.random() * 0.5 + 0.4})` : `rgba(220, 20, 60, ${Math.random() * 0.5 + 0.5})`;
                this.glow = this.isGold ? 'rgba(255, 215, 0, 0.6)' : 'rgba(220, 20, 60, 0);';
                
                this.size = Math.random() * 2.5 + 1;
                this.speedX = (Math.random() - 0.5) * 0.6;
                this.speedY = (Math.random() - 0.5) * 0.6;
                this.angle = Math.random() * Math.PI * 2;
            }

            update() {
                if (heartMode && heartTimer > 0) {
                    // Calculate target position on the heart curve
                    let targetScale = Math.min(canvas.width, canvas.height) / 40;
                    let t = (this.index / particleCount) * Math.PI * 2;
                    let heartPos = getHeartPoint(t, targetScale);
                    
                    let targetX = canvas.width / 2 + heartPos.x;
                    let targetY = canvas.height / 2 + heartPos.y;

                    // Smooth transition to heart
                    this.x += (targetX - this.x) * 0.1;
                    this.y += (targetY - this.y) * 0.1;
                } else {
                    // Regular drifting motion
                    this.x += this.speedX;
                    this.y += this.speedY;

                    // Screen wrap-around
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;

                    // Mouse Interaction (Magnetic Pull)
                    if (mouse.x != null && mouse.y != null) {
                        let dx = mouse.x - this.x;
                        let dy = mouse.y - this.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < mouse.radius) {
                            let force = (mouse.radius - distance) / mouse.radius;
                            this.x += (dx / distance) * force * 2;
                            this.y += (dy / distance) * force * 2;
                        }
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                
                // Add a subtle glow to the golden particles
                if (this.isGold) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
                } else {
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = 'rgba(220, 20, 60, 0.6)';
                }
                
                ctx.fill();
                ctx.shadowBlur = 0; // reset shadow
            }
        }

        // Initialize particles
        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(i));
            }
        }

        // Animation Loop
        function animate() {
            // Slight opacity trail for fluid motion effect
            ctx.fillStyle = 'rgba(10, 5, 13, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            if (heartMode) {
                heartTimer--;
                if (heartTimer <= 0) heartMode = false;
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
