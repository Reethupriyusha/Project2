<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Node Auth</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #06040a 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Ambient Glow in Background */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-pink);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            top: 20%;
            left: 25%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-blue);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            bottom: 20%;
            right: 25%;
            z-index: 0;
        }

        /* Glassmorphic Container */
        .app-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header h2 {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #a0aec0;
            letter-spacing: 0.5px;
            margin-bottom: 35px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }

        /* Modernized Dot Matrix Grid */
        .node-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 35px;
        }

        .matrix-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            height: 80px;
            border-radius: 18px;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .matrix-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .matrix-btn:active, .matrix-btn.active {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            transform: scale(0.95);
        }

        .footer-tag {
            font-size: 0.7rem;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Hidden Dashboard Style */
        .hidden-space {
            display: none;
            opacity: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 450px;
            text-align: center;
            z-index: 2;
            padding: 40px 30px;
            background: rgba(10, 5, 15, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            border: 1px solid rgba(255, 0, 127, 0.15);
            box-shadow: 0 25px 60px rgba(255, 0, 127, 0.1);
            transition: opacity 1s ease;
        }

        .love-icon-container {
            position: relative;
            margin-bottom: 25px;
        }

        .love-icon {
            font-size: 3.5rem;
            color: var(--neon-pink);
            display: inline-block;
            animation: modernPulse 1.2s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 15px rgba(255, 0, 127, 0.6));
        }

        .hidden-space h1 {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
        }

        .hidden-space p {
            color: #e2e8f0;
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 300;
        }

        @keyframes modernPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 0, 127, 0.4)); }
            100% { transform: scale(1.12); filter: drop-shadow(0 0 25px rgba(255, 0, 127, 0.8)); }
        }
    </style>
</head>
<body>

    <!-- Main Front Dashboard -->
    <div class="app-card" id="authInterface">
        <div class="header">
            <h2>Cryptographic Node Vault</h2>
            <div class="status-badge" id="systemStatus">Ready • Awaiting Signature</div>
        </div>

        <div class="node-matrix">
            <button class="matrix-btn" onclick="inputNode(1)">1</button>
            <button class="matrix-btn" onclick="inputNode(2)">2</button>
            <button class="matrix-btn" onclick="inputNode(3)">3</button>
            <button class="matrix-btn" onclick="inputNode(4)">4</button>
            <button class="matrix-btn" onclick="inputNode(5)">5</button>
            <button class="matrix-btn" onclick="inputNode(6)">6</button>
            <button class="matrix-btn" onclick="inputNode(7)">7</button>
            <button class="matrix-btn" onclick="inputNode(8)">8</button>
            <button class="matrix-btn" onclick="inputNode(9)">9</button>
        </div>

        <div class="footer-tag">Secured Layer v2.4.0</div>
    </div>

    <!-- Live Hidden Space Dashboard -->
    <div class="hidden-space" id="loveDashboard">
        <div class="love-icon-container">
            <span class="love-icon">💖</span>
        </div>
        <h1>Decryption Successful</h1>
        <!-- Customize your personal letter to him here -->
        <p>You found the hidden space. No matter how much code I write, you are always my favorite line. Happy coding together! 🥰</p>
    </div>

    <script>
        // Set your 3-digit key sequence here
        const SEQUENCE_KEY = [5, 2, 0];
        let userSequence = [];

        function inputNode(nodeNum) {
            userSequence.push(nodeNum);

            // Add smooth active class state
            const buttons = document.querySelectorAll('.matrix-btn');
            buttons[nodeNum - 1].classList.add('active');
            setTimeout(() => buttons[nodeNum - 1].classList.remove('active'), 250);

            if (userSequence.length === 3) {
                if (userSequence[0] === SEQUENCE_KEY[0] && 
                    userSequence[1] === SEQUENCE_KEY[1] && 
                    userSequence[2] === SEQUENCE_KEY[2]) {
                    
                    // Transition to hidden space seamlessly
                    const card = document.getElementById('authInterface');
                    const hiddenSpace = document.getElementById('loveDashboard');
                    
                    card.style.opacity = '0';
                    setTimeout(() => {
                        card.style.display = 'none';
                        hiddenSpace.style.display = 'flex';
                        setTimeout(() => {
                            hiddenSpace.style.opacity = '1';
                        }, 50);
                    }, 400);

                } else {
                    // Modern design error handling
                    const statusBadge = document.getElementById('systemStatus');
                    statusBadge.innerText = "Signature Match Failed";
                    statusBadge.style.color = "#ff0055";
                    statusBadge.style.background = "rgba(255, 0, 85, 0.1)";
                    statusBadge.style.borderColor = "rgba(255, 0, 85, 0.2)";
                    
                    userSequence = [];
                    
                    setTimeout(() => {
                        statusBadge.innerText = "Ready • Awaiting Signature";
                        statusBadge.style.color = "#a0aec0";
                        statusBadge.style.background = "rgba(255, 255, 255, 0.05)";
                        statusBadge.style.borderColor = "transparent";
                    }, 1500);
                }
            }
        }
    </script>
</body>
</html>
